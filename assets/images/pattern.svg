<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="keyboard-pattern" patternUnits="userSpaceOnUse" width="100" height="100">
      <rect width="100" height="100" fill="none"/>
      <!-- Keyboard key shapes -->
      <rect x="10" y="10" width="20" height="20" rx="3" ry="3" fill="#ffffff" stroke="#000000" stroke-width="0.5" opacity="0.8"/>
      <rect x="40" y="10" width="20" height="20" rx="3" ry="3" fill="#ffffff" stroke="#000000" stroke-width="0.5" opacity="0.8"/>
      <rect x="70" y="10" width="20" height="20" rx="3" ry="3" fill="#ffffff" stroke="#000000" stroke-width="0.5" opacity="0.8"/>
      
      <rect x="10" y="40" width="20" height="20" rx="3" ry="3" fill="#ffffff" stroke="#000000" stroke-width="0.5" opacity="0.8"/>
      <rect x="40" y="40" width="20" height="20" rx="3" ry="3" fill="#ffffff" stroke="#000000" stroke-width="0.5" opacity="0.8"/>
      <rect x="70" y="40" width="20" height="20" rx="3" ry="3" fill="#ffffff" stroke="#000000" stroke-width="0.5" opacity="0.8"/>
      
      <rect x="10" y="70" width="20" height="20" rx="3" ry="3" fill="#ffffff" stroke="#000000" stroke-width="0.5" opacity="0.8"/>
      <rect x="40" y="70" width="20" height="20" rx="3" ry="3" fill="#ffffff" stroke="#000000" stroke-width="0.5" opacity="0.8"/>
      <rect x="70" y="70" width="20" height="20" rx="3" ry="3" fill="#ffffff" stroke="#000000" stroke-width="0.5" opacity="0.8"/>
    </pattern>
  </defs>
  
  <rect width="100" height="100" fill="url(#keyboard-pattern)"/>
</svg>